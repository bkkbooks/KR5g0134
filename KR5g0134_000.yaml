body:
  text: 洞真太上八素真經占候入定妙訣通六太帝告四極真人曰今有篤信至道修學不懈皆是先身巳經積善生諸天上天上著樂無以進功年訖來生輪轉下世或發𩓑啓告求生世間救物立功勤習上道皆非凡人凡人不覺伊亦不自知自知亦不說如此諸人不免灾否或眷屬衰喪或身嬰疾病或公私口舌或𨼆顯逢𠒋惡人醜鬼毒獸鳥蟲金木水火土草為妨良由功德未滿受法未僃急清齊責躬謝過請福精存太上守一無忘施行三五諦憶玄師玄師青童君總領一切經書寶文妙圖皆悉由之學士尋師未遇求經未得得或不足足或不明明或不行行或不久或多漏悮不能憶知或已憶知瞥巳遺忘邪精所干魔鬼所試急擇佳辰丁卯之日登山入室清嚴燒香啓告太上諦存青童向東住心想見方諸宫稽首禮拜面對金闕上相羸疾厄難常禮六拜拜畢叩頭密陳苦志或公私否塞或心識露忘隨𩓑言之指彼即急患不得多及緩事若緩急僃言當書委曲拜竟密讀取不聞竟即燒之後為亦爾氣力強盛可禮十二拜二十四拜三十六拜七十二拜百二十拜二百四十拜三百六十拜七百二十拜一千二百拜一時能竟注心益善復不堪者寅時至丑十二時時百拜也有能二時寅申子午適所堪耳常能行之六旬一百不能移日他辰行也同志三五人不可多相引喧閙泄漏考不可解上學之士精加詳慎修行此法然後為師傳經必得其人付授無悔恨矣凡師傳經不得其人或是其人傳不如法付授之後一十二旬衆灾互湊急謝青童若有福慶亦啓荷恩也凡受道後如法修行九十日無灾病此宿新有善合仙之人四九三百六十日公私勝泰此前後積福合真之人三周涉四年一千二百功德興𨺚幽顯敬伏此上士至勤合神之人便傳授廣度賢明救凡泛愛慈心立功博濟無私克登上聖神真仙君帝王公卿之位矣若受道之後百日之內有諸厄病皆宿新多罪非合仙之人急應首謝誓革心行攺往修來憑請師友洗悔恨之情篤慊欵之志敬信無疑必獲福利四九三周准擬此例建德立功免度危患戰戰兢競𢘆懷慚懼愧有深罪慚無重功不可為師慎勿傳授德業漸升五八四十年乃擇人啓付耳有災強行叨遇為師彼此相誤皆是惡因緣也期篤之中不齊度者師友相結為之祈請首過乞恩至誠丹切不得虛飾又勿苟為心非口是又勿語人稱為功德唯精唯密彼此得福上學之士明共遵行凡生死未止皆由罪根未除出隂入陽動靜多過過積則死死苦可悲上士所畏勤學求生受經行戒方術禳災解罪延福以登神仙初習法者先首過請恩從無始中來億曽萬祖今身七世父母善惡相關七世有得道及賢明才智功德著於幽顯者餘慶所鍾諸罪易釋有頑凶悖逆者衆殃難袪又巳身無始中來至于七祖以來隂陽愆咎或輕或重重則難遣輕則易除易除者齊戒立功少日便感難遣者精苦纍嵗尚不蒙應不蒙應者好致懈退不悟先舋源深更忿神明無驗此增𢙣緣罪不在赦若能彌勤誓死不怠必有良效轉禍為福其中先世先身多功德者今加修善招果自速不明了者乃謂其善未足可稱便云得道或云虛妄或云自然非學所得如此之流復不可教永失道緣方為魔羣生死不巳深可痛悼智眀洞逹之人髙才篤信之士無此諸疑勤行不怠難易小復推移積久皆能得道得道長生要在行善行善止惡心堅意固持戒必令不圎三尊不遣五德默識密行不忘言說善惡未必能行行善不必㑹衆衆猜致誚疑嫉生災是以上聖為善不代知善為善斯不善矣能知善不以矜誇不以自是不以規圖不以為善恬然若無乃得道耳非同志者不得妄說說化可化非人勿強易者四九三周難者二四四六極乎五八之年無不得道不得道者皆由受法不行行之不勤勤之不精其問作罪善惡雜糅功不贖過德不補愆死後得為善緣緣增於鬼得悟幽中立德亦作鬼官積功升仙或為靈人或轉輪貴盛道德之家並不塵勞唯不能於即身得道耳若背叛誹毀初是末非死隨邪黨與善絶因因善不絶皆由信向信向雖不能至到但令不疑惑迷退則善緣日增增長不止必亦成真真人四百年四千年四萬年爰至萬劫傳付各有訣令初學之人以四九三周為限善惡依科慎勿妄犯凡學上道諦定身心身心不定學無所成成學入定守一為先微妙難習守之不能即堅雜營他事守之不能入定當精占候省已及物己身異同物有變怪覺之即改修術用方消而却之久無復異然後入定衆真相携矣一若眼中漠漠光明不𢘆所見非真倣佛不識當精嚴入室燒香存思兩目神道童精長三寸衣五色衣兩目各一人喜相向相就從東西遊行侍從有千乘萬騎良久諦思極則止止又思日夜可十二時存之差乃已能六日不睡道童現形百二十日分明見萬里之外三百六十日逆知吉凶與神合德也罪由好看邪色不視正真改過精思即有驗也二若耳中訇訇或至痛滿不聞逺聲聽語不别當精嚴入室燒香存思耳神道平精長八寸一分素衣從千乘萬騎還耳兩孔之中思極則止止又思差乃巳如上法罪由好聽淫聲不察聖教改過精思乃有驗也三若鼻中清汁或至塞痛所聞不香臭香不嗅當精嚴入室燒香存思鼻神道微精長二寸五分玄衣從千乘萬騎還鼻兩孔之中思極則止止又思差乃巳如上法罪由好嗜肥鮮不喜香馥改過精思即有驗也四若口不知味或齒舌脣痛咽喉不快飮食艱澀當精嚴入室燒香存思舌神道岐精長七寸朱衣從千乘萬騎還口中思極則止止又思差乃巳如上法罪由好味惡言不素不實攺過精思即有驗也五若頭痃痛癢髮落不生當精嚴入室燒香存思腦神道都精長一寸一分青衣從千乘萬騎還頭中思極則止止又思差乃巳如上法罪由輕佻犯上不禮謝三尊改過精思即有驗也六若心腹中煩忿忿不樂絞痛堅脹飲食不消當精嚴入室燒香存思心神道明精長九寸綵衣從千乘萬騎還腹中思極則止止又思差乃巳如上法罪由好動喜怒無常不念清靜不除嫉諍攺過精思即有驗也七若腰背髀骼膝脛腓足酸痛疼動轉艱難當精嚴入室燒香存思脅神道成雜綵斑衣從千乘萬騎還腰背髀骼膝脛腓足兩脅之中思極則止止又思差乃巳如上法罪由強健勞擾不篤端嚴攺過精思即有驗也八若舉體合身內外疾惱不復自覺氣息短急當精嚴入室燒香存思皮膚神道連精長一寸五分丹素之衣從千乘萬騎還身中內外驅邪布正思極則止止又思差乃巳如上法罪由殺盜姦醜不顧正真攺過精思即有驗也九若卒病頓卧或積疾困篤不能痊瘥當令入靖燒香頓首存思腎神道生左右二腎精長二寸三分從千乘萬騎還僃體中思極則止止又思差乃巳如上法罪由凶逆肆暴不念首悔攺過精思即有驗也右九事之來必有候善能占之逆營防僃自然消除永保貞吉凡夢及出行見氛氣晦暝井濁無水汙池不淨糞血尸鬼人物交淫皆眼當有疾急存眼神挼掌令𤍽以尉兩眼二七過止又以手指瓜捻目眥有光明朗則吉青黑則凶又精存思摩尉首謝罪愆則無患矣凡夢及出行聞空中異聲悲驚醜切皆耳當有疾急存耳神交手掩耳二七按之畢拱靜聽思聞太上雲璈之音天鈞之樂延集師友察講誦之聲首謝罪愆則無患矣凡夢及出行聞不香之氣腥臊異常有物入鼻不測是何或塵或蟲或消或滅皆鼻當有疾急存鼻神交手捻鼻縮之噴之二七可止勤守香火合和名香氣煙相續不捨時刻首謝罪愆則無患矣凡夢及出行見飲食朽敗惡人罵詈口動齒酸言語僻誤皆口當有疾急存口神反舌漱液滿口咽之二七可止習誦要戒密呪微吟咨詢經典解滯釋疑首謝罪愆則無患矣凡夢及出行見遊光炫煥雨雪紛披從髙墮下器物翻覆皆頭當有疾急存腦神挼手摩眉修厯額上明堂洞房丹田諸宫擇取東井之水香藥合和為湯沐櫛傳香三過可止勤心禮懴瞻仰三尊首謝罪愆則無患矣凡夢及出行見水火散泆羅網縱橫船車翻覆祼露驚奔皆心腹當有疾急思心神左手掩心右手掩臍臨目閉氣極則微吐之平又閉如此九可止精潔沐浴謹事續明嚴除殺想動止向南候光玩景所行見清貞首謝罪愆則無患矣凡夢及出行見鬪戰打擊擔多負重倒跢折傷武㩧僵仆行杖動刑隂陽相侵皆腰背機關當有疾病急存脅神交手掩脅捻之二十咽氣叩齒各二七可止思惟所行破戒違科即攺革之宜有施恩便自營理諌諍止訟檢口抑身勿妄出入行坐卧起皆務防慎安徐顧望周正心身首謝罪愆則無患矣凡夢及出行見人物相剝食啖非常翻覆男女倒亂隂陽皆使身當疾急存膚神兩手相摩奬將通體極而後已巳又為之三周可止誦習戒律精尋玄言除滯去惑寡欲少私首謝罪愆則無患矣凡夢及出行見人物驚奔大水大火鳥獸紛汨劫賊狂酒兵戈縱橫狗虎逐嚙不識之人妄云有舊皆身當卒病急存實神女子口訣青龍白虎更互摩握二七過止勤遵玄素無負黃書生人生子必依師言首謝罪愆則無患矣凡九事之中萬億條緒端坐聞見與夢行同精按斯㫖衆患自消無勞醫藥則不假祈請矣凡除患清身知變革意意正身清然後入定入定道可成不定真弗降弗能降真豈能得道得道由降真降真由清正清正而不得道未之有也洞真太上八素真經占候入定妙訣
